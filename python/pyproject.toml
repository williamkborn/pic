[project]
name = "picblobs"
version = "0.1.0"
description = "Position-independent code blob library"
requires-python = ">=3.10"
license = "MIT"
readme = "README.md"

dependencies = []

[project.scripts]
picblobs = "picblobs.cli:main"

[project.optional-dependencies]
elf = [
    "pyelftools>=0.31",
]
dev = [
    "picblobs[elf]",
    "pytest>=8.0",
    "pycparser>=2.22",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["picblobs"]

[tool.hatch.build.targets.wheel.force-include]
# Release structure: manifest + flat blobs (generated by tools/extract_release.py).
"picblobs/manifest.json" = "picblobs/manifest.json"
"picblobs/blobs" = "picblobs/blobs"
# Legacy .so files for development fallback.
"picblobs/_blobs" = "picblobs/_blobs"
# Cross-compiled QEMU test runners.
"picblobs/_runners" = "picblobs/_runners"

[tool.pytest.ini_options]
testpaths = ["tests"]
