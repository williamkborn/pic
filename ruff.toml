    "ARG001",
    "ARG002",
    "ARG005",
    "ANN",
    "BLE001",
    "C901",
    "COM812",
    "D",
    "EM",
    "ERA001",
    "EXE001",
    "FBT",
    "FLY002",
    "INP001",
    "N806",
    "N818",
    "PLC0415",
