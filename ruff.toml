"python_cli/tests/*.py" = ["PLR0402", "PT006", "PT011", "PT012", "PT018", "S101", "S108", "TC003"]
"tools/extract_release.py" = ["E402"]
"tools/generate.py" = ["E501"]
"tools/registry.py" = ["E501"]
"tools/validate_wine.py" = ["E402"]
